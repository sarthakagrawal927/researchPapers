services:
  postgres:
    image: postgres:16-alpine
    container_name: researchpapers_pg
    environment:
      POSTGRES_USER: papers
      POSTGRES_PASSWORD: papers
      POSTGRES_DB: papers
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papers -d papers"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.10-alpine
    container_name: researchpapers_ch
    environment:
      CLICKHOUSE_DB: papers
      CLICKHOUSE_USER: papers
      CLICKHOUSE_PASSWORD: papers
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"   # HTTP interface (used by clickhouse-connect)
      - "9001:9000"   # native protocol (avoid clash with anything on 9000)
    volumes:
      - chdata:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    deploy:
      resources:
        limits:
          memory: 8g
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  chdata:
